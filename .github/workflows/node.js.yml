# CI for trackmanager monorepo (npm workspaces)
# Deletes sub-directory lockfiles and regenerates a fresh root lockfile on
# the Linux runner so platform-specific optional deps (e.g. @rollup/rollup-linux-x64-gnu)
# are resolved correctly. See https://github.com/npm/cli/issues/4828

name: Node.js CI

on:
  push:
    branches: [ $default-branch ]
  pull_request:
    branches: [ $default-branch ]

env:
  LANG: de_DE.UTF-8

jobs:
  build_client:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: 'npm'
      - name: Clean stale lockfiles and install
        run: |
          rm -f client/package-lock.json server/package-lock.json shared/package-lock.json
          rm -f package-lock.json
          npm install
      - run: npm run build -w client

  test_client:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: 'npm'
      - name: Clean stale lockfiles and install
        run: |
          rm -f client/package-lock.json server/package-lock.json shared/package-lock.json
          rm -f package-lock.json
          npm install
      - run: npm run test -w client

  lint_client:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: 'npm'
      - name: Clean stale lockfiles and install
        run: |
          rm -f client/package-lock.json server/package-lock.json shared/package-lock.json
          rm -f package-lock.json
          npm install
      - run: npm run lint -w client

  typecheck_client:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: 'npm'
      - name: Clean stale lockfiles and install
        run: |
          rm -f client/package-lock.json server/package-lock.json shared/package-lock.json
          rm -f package-lock.json
          npm install
      - run: npm run typecheck -w client

  build_server:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "~24"
      - name: Clean stale lockfiles and install
        run: |
          rm -f client/package-lock.json server/package-lock.json shared/package-lock.json
          rm -f package-lock.json
          npm install
      - run: npm run copyconfig -w server
      - run: npm run build -w server
      - run: npm run lint -w server
      - run: npm run test -w server
      - run: npm run typecheck -w server

  lint_server:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "~24"
      - name: Clean stale lockfiles and install
        run: |
          rm -f client/package-lock.json server/package-lock.json shared/package-lock.json
          rm -f package-lock.json
          npm install
      - run: npm run lint -w server

  test_server:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "~24"
      - name: Clean stale lockfiles and install
        run: |
          rm -f client/package-lock.json server/package-lock.json shared/package-lock.json
          rm -f package-lock.json
          npm install
      - run: npm run copyconfig -w server
      - run: npm run test -w server

  typecheck_server:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "~24"
      - name: Clean stale lockfiles and install
        run: |
          rm -f client/package-lock.json server/package-lock.json shared/package-lock.json
          rm -f package-lock.json
          npm install
      - run: npm run typecheck -w server
